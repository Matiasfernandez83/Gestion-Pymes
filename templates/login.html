<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sistema de Gestión Operativa para Pymes — Login"/>
  <title>Iniciar Sesión | Gestión Pymes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">🏢</div>
      <h1 class="login-title">Gestión Pymes</h1>
      <p class="login-sub">Sistema Operativo Integrado</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}" style="margin-bottom:1rem">
              ⚠️ {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input class="form-control" type="text" id="username" name="username"
                 placeholder="Ingrese su usuario" required autofocus/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">
          🔐 Ingresar al Sistema
        </button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:11px;color:var(--text-muted)">
        Demo: <strong style="color:var(--accent)">admin</strong> / <strong style="color:var(--accent)">admin123</strong>
      </p>
    </div>
  </div>
</body>
</html>
